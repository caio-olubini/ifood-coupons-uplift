<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-label="Project architecture">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#717171"/>
    </marker>
    <filter id="card" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000012"/>
    </filter>
  </defs>
  <rect width="920" height="260" rx="16" fill="#f7f7f7" stroke="#eaeaea"/>

  <g font-family="Inter,Segoe UI,Helvetica,Arial,sans-serif">
    <!-- boxes -->
    <g filter="url(#card)">
      <rect x="24" y="88" width="130" height="84" rx="12" fill="#fff" stroke="#eaeaea"/>
      <rect x="184" y="88" width="150" height="84" rx="12" fill="#fff" stroke="#eaeaea"/>
      <rect x="364" y="88" width="150" height="84" rx="12" fill="#fff" stroke="#eaeaea"/>
      <rect x="544" y="88" width="150" height="84" rx="12" fill="#fff" stroke="#2a78d6" stroke-width="2"/>
      <rect x="724" y="48" width="172" height="84" rx="12" fill="#ea1d2c" stroke="#c11424"/>
      <rect x="724" y="148" width="172" height="84" rx="12" fill="#fff" stroke="#2d6a4f" stroke-width="2"/>
    </g>

    <text x="89" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Raw JSON</text>
    <text x="89" y="140" text-anchor="middle" font-size="11" fill="#717171">offers · profile</text>
    <text x="89" y="156" text-anchor="middle" font-size="11" fill="#717171">· transactions</text>

    <text x="259" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Spark pipeline</text>
    <text x="259" y="140" text-anchor="middle" font-size="11" fill="#717171">clean · attribute</text>
    <text x="259" y="156" text-anchor="middle" font-size="11" fill="#717171">· features · G1G10</text>

    <text x="439" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">Modeling</text>
    <text x="439" y="140" text-anchor="middle" font-size="11" fill="#717171">X-learner · blend</text>
    <text x="439" y="156" text-anchor="middle" font-size="11" fill="#717171">Qini · gain curve</text>

    <text x="619" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#2a78d6">CLI</text>
    <text x="619" y="140" text-anchor="middle" font-size="11" fill="#717171">train · predict</text>
    <text x="619" y="156" text-anchor="middle" font-size="11" fill="#717171">top-N · 1 offer/client</text>

    <text x="810" y="82" text-anchor="middle" font-size="15" font-weight="800" fill="#fff">Simulator</text>
    <text x="810" y="104" text-anchor="middle" font-size="11" fill="#ffffffcc">budget · filters</text>
    <text x="810" y="120" text-anchor="middle" font-size="11" fill="#ffffffcc">3 strategies · CSV</text>

    <text x="810" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#2d6a4f">Holdout eval</text>
    <text x="810" y="200" text-anchor="middle" font-size="11" fill="#717171">observed</text>
    <text x="810" y="216" text-anchor="middle" font-size="11" fill="#717171">counterfactual</text>

    <!-- arrows main flow -->
    <line x1="154" y1="130" x2="184" y2="130" stroke="#717171" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="334" y1="130" x2="364" y2="130" stroke="#717171" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="514" y1="130" x2="544" y2="130" stroke="#717171" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="694" y1="118" x2="724" y2="90" stroke="#ea1d2c" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="439" y1="172" x2="810" y2="190" stroke="#2d6a4f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow)"/>

    <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">End-to-end flow</text>
    <text x="460" y="58" text-anchor="middle" font-size="12" fill="#717171">spec-driven · tested invariants · offline proof before deploy</text>
  </g>
</svg>
