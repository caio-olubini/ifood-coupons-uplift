# Publica o simulador estático em GitHub Pages (spec 03, REQ-311, T-312).
# Empurra o conteúdo de simulator/ para a branch gh-pages (site na raiz).
# Pré-requisito único no GitHub: Settings → Pages → Deploy from branch → gh-pages → /

name: Deploy simulador (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "simulator/**"
      - ".github/workflows/deploy-simulator-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publicar em gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./simulator
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy simulador @ ${{ github.sha }}"
