# Config do pipeline de dados & EDA (REQ-110).
# Todo parâmetro de comportamento do pipeline vive aqui — nada hardcoded em src/.

raw_dir: data/raw
processed_dir: data/processed

offers_filename: offers.json
profile_filename: profile.json
transactions_filename: transactions.json

age_sentinel: 118
test_start_date: "20180726" # t=0 do teste; proxy = max(registered_on) observado no profile

smd_threshold: 0.1
attribution_priority: earliest_received # earliest_received | latest_received

# A onda é derivada como o rank do received_time distinto (os disparos são
# discretos: t=0, 7, 14, 17, 21, 24). n_campaign_waves é o nº esperado de ondas,
# verificado na auditoria — não um parâmetro de derivação.
n_campaign_waves: 6

contract_sample_size: 1000 # nº de linhas amostradas na validação Pydantic do contrato (REQ-107)

# EDA descritiva (REQ-108) e segmentação (REQ-111).
histogram_bins: 40
quantile_rel_error: 0.001 # erro relativo do approxQuantile (0 = exato, caro)
outlier_iqr_multiplier: 1.5 # cerca de Tukey: fora de [Q1 - k·IQR, Q3 + k·IQR]
correlation_threshold: 0.8 # |r| a partir do qual o par é reportado como redundante

# K-Means: k é escolhido por silhouette dentro da faixa, a varredura inteira reportada.
cluster_k_min: 2
cluster_k_max: 8
cluster_silhouette_sample: 5000 # silhouette é O(n²) — amostra, com a seed da config

# Infra do Spark local: o heap default da JVM não dá conta do dado real.
spark_master: "local[*]"
spark_driver_memory: "4g"
spark_shuffle_partitions: 16

seed: 42

# Nota: reward_cost (REQ-106) usa o discount_value do próprio catálogo de
# ofertas, não uma tabela de custo por tipo — logo não há parâmetro de custo
# aqui. Se o custo passar a divergir do discount_value, adicione-o nesta config.

# Modelagem (spec 02). Split treino/validação por campaign_wave — ondas < cutoff
# treinam, >= cutoff validam. Nunca split aleatório.
validation_wave_cutoff: 4

# Baseline preditivo (REQ-201): âncora, não tuning.
lgbm_n_estimators: 200
lgbm_max_depth: -1
lgbm_learning_rate: 0.05
logit_max_iter: 1000

# X-learner (REQ-202).
xlearner_n_estimators: 200
xlearner_max_depth: -1
xlearner_learning_rate: 0.05

# Avaliação offline: curva de ganho incremental por budget top-N (REQ-206).
# Budgets destacados na leitura "se meu budget for N, quanto ganho cada
# estratégia?" — a curva inteira é varrida; estes são só os pontos tabelados.
gain_curve_budgets: [1000, 5000, 10000]

# Teste de placebo por permutação (REQ-212): réplicas do embaralhamento de
# `treatment` e o percentil da distribuição nula que o Qini real precisa superar.
placebo_n_permutations: 20
placebo_confidence_level: 0.95

# Calibração da magnitude do uplift (REQ-213): nº de bins de τ previsto onde o
# uplift previsto médio é comparado ao observado (tratado − controle no bin).
calibration_n_bins: 10

# Calibração isotônica pós-hoc (REQ-214): cross-fitting dentro do holdout, cada
# fold avaliado com a isotônica ajustada nos outros folds.
calibration_n_folds: 5

# Tracking de experimentos (REQ-209): SQLite local, sem servidor.
mlflow_tracking_uri: "sqlite:///mlflow.db"
mlflow_experiment_name: "ifood-uplift"
