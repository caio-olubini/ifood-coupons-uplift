# Config do pipeline de dados & EDA (REQ-110).
# Todo parâmetro de comportamento do pipeline vive aqui — nada hardcoded em src/.

raw_dir: data/raw
processed_dir: data/processed

offers_filename: offers.json
profile_filename: profile.json
transactions_filename: transactions.json

age_sentinel: 118
test_start_date: "20180726" # t=0 do teste; proxy = max(registered_on) observado no profile

smd_threshold: 0.1
attribution_priority: earliest_received # earliest_received | latest_received

# A onda é derivada como o rank do received_time distinto (os disparos são
# discretos: t=0, 7, 14, 17, 21, 24). n_campaign_waves é o nº esperado de ondas,
# verificado na auditoria — não um parâmetro de derivação.
n_campaign_waves: 6

# Recorrência: recebimento convertido cujo cliente converteu de novo (qualquer
# oferta) em até N dias. Derivada do target — nunca vira feature do modelo.
recurrence_window_days: 7

contract_sample_size: 1000 # nº de linhas amostradas na validação Pydantic do contrato (REQ-107)

# EDA descritiva (REQ-108) e segmentação (REQ-111).
histogram_bins: 40
quantile_rel_error: 0.001 # erro relativo do approxQuantile (0 = exato, caro)
outlier_iqr_multiplier: 1.5 # cerca de Tukey: fora de [Q1 - k·IQR, Q3 + k·IQR]
correlation_threshold: 0.8 # |r| a partir do qual o par é reportado como redundante

# K-Means: k é escolhido por silhouette dentro da faixa, a varredura inteira reportada.
cluster_k_min: 2
cluster_k_max: 8
cluster_silhouette_sample: 5000 # silhouette é O(n²) — amostra, com a seed da config

# Features do clustering de personas (src/clustering), a nível cliente e
# descritivas (janela inteira — nunca viram feature do X-learner). conv_rate e
# identity_missing ficam de fora de propósito (resposta / segmento à parte); o
# log1p das caudas é da transformação (clustering.preprocess.LOG_FEATURES).
cluster_features:
  - age
  - credit_card_limit
  - tenure_days
  - spend_total
  - txn_count
  - avg_ticket
  - view_rate

# Infra do Spark local: o heap default da JVM não dá conta do dado real, mas o
# teto precisa caber no hardware — nesta máquina (12 cores, 7,5 GB de RAM, ~3 GB
# livres com o desktop aberto), local[*] + 4g de heap estoura a RAM física e o
# SO entra em swap/thrashing (PC congela, sem erro do Spark). local[4] limita as
# tasks concorrentes (cada uma carrega buffers próprios de sort/join) e 3g deixa
# folga para o kernel Python e o resto do sistema.
spark_master: "local[4]"
spark_driver_memory: "2g"
spark_shuffle_partitions: 16

seed: 42

# Nota: reward_cost (REQ-106) usa o discount_value do próprio catálogo de
# ofertas, não uma tabela de custo por tipo — logo não há parâmetro de custo
# aqui. Se o custo passar a divergir do discount_value, adicione-o nesta config.

# Modelagem (spec 02). Split treino/validação por campaign_wave — ondas < cutoff
# treinam, >= cutoff validam. Nunca split aleatório.
validation_wave_cutoff: 4

# Baseline preditivo (REQ-201): âncora, não tuning.
lgbm_n_estimators: 200
lgbm_max_depth: -1
lgbm_learning_rate: 0.05
logit_max_iter: 1000

# X-learner (REQ-202).
xlearner_n_estimators: 200
xlearner_max_depth: -1
xlearner_learning_rate: 0.05

# Modelos treinados (src.models): onde `model train` escreve e `model predict`
# lê. blend_mode/blend_lambda/blend_gamma são o blend padrão do
# BlendedUpliftModel sem argumentos — os dois melhores blends do holdout real
# (λ=0,3 fixo, γ=1,0 dinâmico); blend_mode escolhe qual.
models_dir: "models"
blend_mode: "fixed"
blend_lambda: 0.3
blend_gamma: 1.0

# Temperatura da amostragem softmax na etapa de rank — o mecanismo de rank
# padrão dos modelos (rank/serve/predict). τ→0 = determinístico (corte duro por
# score), τ alto → loteria uniforme; τ=0,1 dá chance a quem está logo abaixo do
# corte. Reprodutível pela seed, estocástico por design. Zerar recupera o
# determinístico.
blend_temperature: 0.1

# Serving (`python -m src.cli predict`): budget default (nº de ações a
# recomendar) sem `--budget`. Uma oferta por cliente, então é também o nº de
# clientes distintos atendidos.
predict_budget: 1000

# Avaliação offline: curva de ganho incremental por budget top-N (REQ-206).
# Budgets destacados na leitura "se meu budget for N, quanto ganho cada
# estratégia?" — a curva inteira é varrida; estes são só os pontos tabelados.
gain_curve_budgets: [1000, 5000, 10000, 15000]

# Teste de placebo por permutação (REQ-212): réplicas do embaralhamento de
# `treatment` e o percentil da distribuição nula que o Qini real precisa superar.
placebo_n_permutations: 20
placebo_confidence_level: 0.95

# Classificação de quadrante de uplift (persuadable/sure thing/lost cause/
# sleeping dog): corte primário em τ, não em μ₀/μ₁ separados — dois cortes
# independentes em μ₀/μ₁ não correspondem a uma curva de nível de τ constante.
# quadrant_tau_epsilon é a banda |τ| ≤ ε onde o efeito é indistinguível de
# zero: medido como o desvio da distribuição nula do teste de placebo acima
# no dado real, não um número arbitrário. Dentro da banda,
# quadrant_p_convert_threshold separa sure_thing (converte de qualquer jeito)
# de lost_cause (não converte de qualquer jeito); 0,5 é o ponto natural para
# uma probabilidade.
quadrant_tau_epsilon: 0.012
quadrant_p_convert_threshold: 0.5

# Tracking de experimentos (REQ-209): SQLite local, sem servidor.
mlflow_tracking_uri: "sqlite:///mlflow.db"
mlflow_experiment_name: "ifood-uplift"
